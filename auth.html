<!DOCTYPE html>
 <html lang="zh-CN">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>账号注册与登录 - 阜新市第十一中学中央通讯社</title>
     <style>
         /* 全局样式 */
         * {
             margin: 0;
             padding: 0;
             box-sizing: border-box;
             font-family: '思源黑体', 'Roboto', sans-serif;
         }
         body {
             background-color: #f0f2f5;
             display: flex;
             justify-content: center;
             align-items: center;
             min-height: 100vh;
             padding: 20px;
         }
         .container {
             background: white;
             border-radius: 10px;
             box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
             width: 100%;
             max-width: 900px;
             overflow: hidden;
             display: flex;
             flex-direction: row;
         }
         /* 左侧登录面板 */
         .login-panel {
             flex: 1;
             padding: 40px;
             background-color: #B71C1C;
             color: white;
             display: flex;
             flex-direction: column;
             justify-content: center;
         }
         .login-panel h2 {
             margin-bottom: 30px;
             font-size: 24px;
             text-align: center;
         }
         .social-login {
             display: flex;
             flex-direction: column;
             gap: 15px;
         }
         .social-btn {
             display: flex;
             align-items: center;
             justify-content: center;
             padding: 12px 20px;
             border-radius: 5px;
             border: none;
             font-size: 16px;
             font-weight: 500;
             cursor: pointer;
             transition: transform 0.2s;
             position: relative;
         }
         .social-btn:hover {
             transform: scale(1.02);
         }
         .google-btn {
             background-color: white;
             color: #333;
         }
         .microsoft-btn {
             background-color: #00a4ef;
             color: white;
         }
         .social-btn img {
             width: 24px;
             height: 24px;
             margin-right: 10px;
         }
         /* 右侧注册面板 */
         .register-panel {
             flex: 1;
             padding: 40px;
             display: flex;
             flex-direction: column;
             justify-content: center;
         }
         .register-panel h2 {
             margin-bottom: 20px;
             font-size: 24px;
             color: #333;
             text-align: center;
         }
         .register-panel p {
             color: #666;
             margin-bottom: 30px;
             text-align: center;
         }
      .form-group {
             margin-bottom: 20px;
         }
         .form-group label {
             display: block;
             margin-bottom: 8px;
             color: #333;
             font-weight: 500;
         }
         .form-group input {
             width: 100%;
             padding: 12px 15px;
             border: 1px solid #ddd;
             border-radius: 5px;
             font-size: 16px;
             transition: border-color 0.3s;
         }
         .form-group input:focus {
             border-color: #B71C1C;
             outline: none;
         }
         /* 人机验证样式 */
         .captcha-container {
             display: flex;
             align-items: center;
             padding: 12px 15px;
             border: 1px solid #ddd;
             border-radius: 5px;
             margin-bottom: 20px;
             cursor: pointer;
             transition: background-color 0.3s;
         }
         .captcha-container:hover {
             background-color: #f9f9f9;
         }
         .captcha-checkbox {
             width: 20px;
             height: 20px;
             border: 2px solid #ddd;
             border-radius: 3px;
             margin-right: 12px;
             display: flex;
             align-items: center;
             justify-content: center;
             transition: background-color 0.3s, border-color 0.3s;
         }
         .captcha-checkbox.checked {
             background-color: #B71C1C;
             border-color: #B71C1C;
         }
         .captcha-checkbox.checked::after {
             content: '✓';
             color: white;
             font-weight: bold;
         }
         .captcha-text {
             color: #666;
             font-size: 14px;
         }
         .captcha-success {
             color: #4caf50;
             font-size: 14px;
             margin-left: 10px;
             display: none;
         }
         .register-btn {
             width: 100%;
             padding: 12px;
             background-color: #B71C1C;
             color: white;
             border: none;
             border-radius: 5px;
             font-size: 16px;
             font-weight: 500;
             cursor: pointer;
             transition: background-color 0.3s;
         }
         .register-btn:disabled {
             background-color: #ccc;
             cursor: not-allowed;
         }
         .register-btn:hover:not(:disabled) {
             background-color: #8B0000;
         }
         /* 响应式 */
         @media (max-width: 768px) {
             .container {
                 flex-direction: column;
             }
         }
         /* 模拟弹窗样式 */
         .modal {
             position: fixed;
             top: 0; left: 0; right: 0; bottom: 0;
             background: rgba(0,0,0,0.5);
             display: none;
             justify-content: center;
             align-items: center;
             z-index: 999;
           }
       .modal-content {
             background: white;
             padding: 20px;
             border-radius: 8px;
             width: 300px;
             text-align: center;
         }
         .modal-btn {
             margin: 10px;
             padding: 8px 16px;
             border: none;
             border-radius: 4px;
             cursor: pointer;
         }
     </style>
 </head>
 <body>
     <div class="container">
         <!-- 左侧登录面板 -->
         <div class="login-panel">
             <h2>账号登录</h2>
             <div class="social-login">
                 <!-- 谷歌账号 - 站内模拟授权 -->
                 <button class="social-btn google-btn" onclick="simulateAuth('Google')">
                     <img src="https://img.icons8.com/color/48/000000/google-logo.png" alt="Google">
                     使用谷歌账号登录
                 </button>
                 <!-- 微软账号 - 站内模拟授权 -->
                 <button class="social-btn microsoft-btn" onclick="simulateAuth('Microsoft')">
                     <img src="https://img.icons8.com/color/48/000000/microsoft.png" alt="Microsoft">
                     使用微软账号登录
                 </button>
             </div>
         </div>
         <!-- 右侧注册面板 -->
         <div class="register-panel">
             <h2>创建新账号</h2>
             <p>加入阜新市第十一中学中央通讯社，开启你的创作之旅</p>
             <form id="registerForm">
                 <div class="form-group">
                     <label for="username">用户名</label>
                     <input type="text" id="username" placeholder="请输入你的昵称" required>
                 </div>
                 <div class="form-group">
                     <label for="email">邮箱</label>
                     <input type="email" id="email" placeholder="xxx@example.com" required>
                 </div>
                 <div class="form-group">
                     <label for="password">设置密码</label>
                     <input type="password" id="password" placeholder="至少8位，包含字母和数字" required>
                 </div>
                 <!-- 人机验证 -->
                 <div class="captcha-container" id="captchaContainer">
                     <div class="captcha-checkbox" id="captchaCheckbox"></div>
                     <span class="captcha-text">我不是机器人</span>
                     <span class="captcha-success" id="captchaSuccess">✓ 验证通过</span>
                 </div>
                 <button type="submit" class="register-btn" id="registerBtn" disabled>完成注册</button>
             </form>
         </div>
     </div>
     <!-- 模拟授权弹窗 -->
     <div class="modal" id="authModal">
         <div class="modal-content">
             <h3 id="modalTitle">账号授权</h3>
             <p id="modalText">正在请求账号权限...</p>
             <button class="modal-btn" style="background:#4285F4; color:white;" onclick="handleAuth()">允许</button>
             <button class="modal-btn" onclick="closeModal()">取消</button>
         </div>
     </div>
     <script>
         // 元素获取
         const captchaContainer = document.getElementById('captchaContainer');
         const captchaCheckbox = document.getElementById('captchaCheckbox');
         const captchaSuccess = document.getElementById('captchaSuccess');
         const registerBtn = document.getElementById('registerBtn');
         const registerForm = document.getElementById('registerForm');
         const authModal = document.getElementById('authModal');
         const modalTitle = document.getElementById('modalTitle');
         const modalText = document.getElementById('modalText');
         // 人机验证逻辑
         captchaContainer.addEventListener('click', () => {
             captchaCheckbox.classList.toggle('checked');
             if (captchaCheckbox.classList.contains('checked')) {
                 captchaSuccess.style.display = 'block';
                 registerBtn.disabled = false;
             } else {
                 captchaSuccess.style.display = 'none';
                 registerBtn.disabled = true;
             }
         });
         // 模拟第三方账号授权
         function simulateAuth(type) {
             authModal.style.display = 'flex';
             modalTitle.innerText = `${type} 账号授权`;
             modalText.innerText = `请求访问你的 ${type} 账号信息，是否允许？`;
         }
         // 处理授权结果
         function handleAuth() {
             closeModal();
             // 模拟获取账号信息并自动填充
             alert('授权成功！账号信息已自动填充至注册表单。');
             // 这里可以添加自动填充逻辑，例如：
             // document.getElementById('email').value = '你的账号@gmail.com';
         }
         // 关闭弹窗
         function closeModal() {
             authModal.style.display = 'none';
         }
         // 表单提交（模拟）
         registerForm.addEventListener('submit', (e) => {
             e.preventDefault();
             alert('🎉 注册成功！欢迎加入阜新市第十一中学中央通讯社！');
             // 注册成功后可以跳转至首页
             // window.location.href = 'index.html';
         });
     </script>
 </body>
 </html>
